stages:
  - test
  - coverage
  - build

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"

cache:
  paths:
    - .m2/repository

unit_tests:
  stage: test
  image: maven:3.9.9-eclipse-temurin-21
  script:
    - echo "Running unit tests..."
    - mvn clean test
    - echo "Unit tests completed successfully"
  artifacts:
    when: always
    reports:
      junit:
        - target/surefire-reports/TEST-*.xml
    paths:
      - target/surefire-reports/
      - target/site/jacoco/
  only:
    - main
    - develop
    - /^feature\/.*$/
    - merge_requests

coverage:
  stage: coverage
  image: maven:3.9.9-eclipse-temurin-21
  needs:
    - job: unit_tests
      artifacts: true
  script:
    - echo "Evaluating coverage report..."
    - |
      awk -F',' 'NR > 1 {
        missed  += $4 + $6 + $8 + $10 + $12 + $14
        covered += $5 + $7 + $9 + $11 + $13 + $15
      } END {
        if (missed + covered > 0)
          printf "Coverage: %.2f%%\n", covered / (missed + covered) * 100
        else
          print "Coverage: 0.00%"
      }' target/site/jacoco/jacoco.csv
    - echo "Coverage evaluation completed"
  coverage: '/Coverage: (\d+\.\d+)%/'
  artifacts:
    when: always
    paths:
      - target/site/jacoco/
  only:
    - main
    - develop
    - /^feature\/.*$/
    - merge_requests

build_image:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  script:
    - echo "Building Docker image..."
    - docker build -t customer-api:latest .
    - echo "Docker image built successfully"
  only:
    - main
    - tags
