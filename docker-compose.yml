version: "3.8"

services:

  db:
    image: mysql:8
    container_name: sd3_mysql
    restart: always
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sd3
      MYSQL_USER: SOME_USER
      MYSQL_PASSWORD: SOME_PASSWORD
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: user_management_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/sd3
      SPRING_DATASOURCE_USERNAME: SOME_USER
      SPRING_DATASOURCE_PASSWORD: SOME_PASSWORD
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data: