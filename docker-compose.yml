services:

  db:
    image: mysql:8
    container_name: sd3_mysql
    restart: always
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    container_name: sd3_mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: ${DB_NAME}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: user_management_ms
    restart: always
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"
    environment:
      SERVER_PORT: ${SERVER_PORT}
      # Switch database engine: mysql | mongodb
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      # MySQL credentials (used when SPRING_PROFILES_ACTIVE=mysql)
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      # MongoDB URI (used when SPRING_PROFILES_ACTIVE=mongodb)
      MONGODB_URI: ${MONGODB_URI}
    # Only depends on MySQL by default (SPRING_PROFILES_ACTIVE=mysql).
    # When switching to the "mongodb" profile, start mongo first:
    #   docker compose up mongo -d && docker compose up app
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
  mongo_data:
