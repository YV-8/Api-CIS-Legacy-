spring.application.name=user-management-ms
server.port=8081

# Active profile controls which database engine is used: mysql | mongodb
# Override via env var: SPRING_PROFILES_ACTIVE=mongodb
spring.profiles.active=mysql

jwt.secret=your-super-secret-key-minimum-256-bits-long
jwt.expiration=3600000

security.enabled=false

# Swagger/OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.requestInterceptor=

