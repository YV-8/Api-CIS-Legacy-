spring.application.name=user-management-ms
server.port=8081

spring.datasource.url=jdbc:mysql://localhost:3307/sd3?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
spring.datasource.username=SOME_USER
spring.datasource.password=SOME_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.jpa.hibernate.ddl-auto = update
spring.jpa.show-sql = true 


spring.jpa.properties.hibernate.connection.characterEncoding=UTF-8
spring.jpa.properties.hibernate.connection.useUnicode=true

jwt.secret=your-super-secret-key-minimum-256-bits-long
jwt.expiration=3600000
